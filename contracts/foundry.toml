[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 256
depth = 128
fail_on_revert = false

[rpc_endpoints]
# Arc testnet RPC — fill in when deploying
arc_testnet = "${ARC_RPC_URL}"

[etherscan]
arc = { key = "placeholder", url = "https://testnet.arcscan.app/api" }
