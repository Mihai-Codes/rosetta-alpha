[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
# Arc testnet RPC — fill in when deploying
arc_testnet = "${ARC_RPC_URL}"

[etherscan]
arc = { key = "${ETHERSCAN_API_KEY}", url = "${ARC_EXPLORER_URL}" }
