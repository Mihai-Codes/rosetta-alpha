  <circle cx="195" cy="388" r="3" fill="#555"/>
  <circle cx="203" cy="393" r="3" fill="#555"/>
  <circle cx="198" cy="384" r="3" fill="#555"/>
  <circle cx="206" cy="388" r="3" fill="#555"/>
  <circle cx="192" cy="394" r="3" fill="#555"/>
  <circle cx="201" cy="397" r="3" fill="#555"/>
  <circle cx="207" cy="382" r="3" fill="#555"/>
