  <text x="400" y="348" font-family="monospace" font-size="8" fill="#e0e0e0">THE ROSETTA RESPONSE</text>
  <line x1="400" y1="353" x2="770" y2="353" stroke="#1e1e1e" stroke-width="1"/>

  <rect x="400" y="359" width="3" height="22" fill="#22c55e" rx="1"/>
  <text x="410" y="368" font-family="monospace" font-size="8" fill="#e0e0e0">Multi-language routing</text>
